<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>三浦三十三観音 巡礼</title>
<style>
:root {
  --rust: #8B3A2A; --gold: #C4933F; --sage: #3A6B3A; --warn: #B85C00;
  --ink: #1a1a1a; --row-odd: #fff; --row-even: #f7f3ec; --hdr-bg: #3d3228;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, "Hiragino Sans", sans-serif; font-size: 13px; background: #e8e2d8; color: var(--ink); padding-bottom: 32px; }
.app-bar { position: sticky; top: 0; z-index: 200; background: var(--rust); color: white; padding: 48px 16px 10px; text-align: center; box-shadow: 0 2px 6px rgba(0,0,0,.3); }
.app-bar h1 { font-size: 1rem; font-weight: 700; }
.app-bar p { font-size: .72rem; opacity: .85; margin-top: 2px; }
.tabs { position: sticky; top: 82px; z-index: 190; display: flex; overflow-x: auto; background: #5c2318; -webkit-overflow-scrolling: touch; }
.tabs::-webkit-scrollbar { display: none; }
.tab { flex: none; padding: 12px 16px; font-size: .75rem; font-weight: 700; color: rgba(255,255,255,0.5); white-space: nowrap; border-bottom: 3px solid transparent; cursor: pointer; }
.tab.active { color: #fff; border-bottom-color: var(--gold); }
.panel { display: none; }
.panel.active { display: block; }
.access-bar { background: #fff8ee; border-left: 4px solid var(--gold); padding: 8px 12px; font-size: .75rem; color: #5a4020; margin: 10px; border-radius: 0 6px 6px 0; line-height: 1.6; }
.tbl-wrap { overflow-x: auto; margin: 0 10px 16px; border-radius: 8px; border: 1px solid #ccc; background: white; -webkit-overflow-scrolling: touch; }
table { border-collapse: collapse; width: 100%; min-width: 600px; }
thead th { background: var(--hdr-bg); color: white; font-size: .7rem; padding: 8px; text-align: center; }
tr.temple-row { background: #e8f0e8; border-top: 2px solid #4a8a4a; }
tr.temple-row td { padding: 8px; font-weight: 700; }
.num-cell { background: var(--sage); color: white; padding: 2px 6px; border-radius: 4px; font-size: .7rem; margin-right: 4px; display: inline-block; }
.num-cell.bangai { background: #8B6914; }
tr.seg-row { border-top: 1px solid #eee; }
tr.seg-row:nth-child(even) { background: #fafafa; }
tr.seg-row td { padding: 6px 8px; font-size: .75rem; vertical-align: middle; }
.mode-badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 6px; border-radius: 4px; font-size: .65rem; font-weight: 700; }
.m-bus { background: #FEF3C7; color: #92400E; }
.m-keikyu { background: #FEE2E2; color: #991B1B; }
.m-walk { background: #F3E8FF; color: #6B21A8; }
.map-btn { display: inline-block; background: var(--rust); color: white; text-decoration: none; padding: 4px 8px; border-radius: 4px; font-size: .7rem; }
.total-row td { background: #f0e8d8; font-weight: 700; padding: 10px; text-align: right; color: var(--rust); }
</style>
</head>
<body>
<div class="app-bar">
  <h1>三浦三十三観音 巡礼行程</h1>
  <p>蓮根駅発 / 全4日間行程管理</p>
</div>
<div class="tabs" id="tabMenu"></div>
<div id="panelContent"></div>

<script>
const DAYS = [
  { label: '浦賀・久里浜', title: '1日目：横須賀中部・林・長井', access: '蓮根駅→追浜駅起点', rows: [
    {type:'temple', num:'22番', name:'観音寺', addr:'横須賀市追浜東町', stop:'追浜駅徒歩', fare:900},
    {type:'seg', mode:'京急', from:'蓮根駅', dep:0.2847, to:'追浜駅', arr:0.3472},
    {type:'seg', mode:'徒歩', from:'追浜駅', dep:0.3472, to:'観音寺', arr:0.3631}
  ]},
  { label: '葉山・秋谷', title: '2日目：逗子・葉山・秋谷', access: '蓮根駅→逗子葉山駅起点', rows: [
    {type:'temple', num:'23番', name:'観蔵院', addr:'逗子市桜山', stop:'逗子葉山駅', fare:1190},
    {type:'seg', mode:'京急', from:'蓮根駅', dep:0.2847, to:'逗子葉山駅', arr:0.3527}
  ]},
  { label: '三浦海岸', title: '3日目：野比・久里浜・浦賀', access: '蓮根駅→浦賀駅・野比駅', rows: [
    {type:'temple', num:'11番', name:'称名寺', addr:'横須賀市野比', stop:'YRP野比駅', fare:360},
    {type:'seg', mode:'京急', from:'蓮根駅', dep:0.425, to:'YRP野比駅', arr:0.4333}
  ]},
  { label: '三崎口・結願', title: '4日目：三崎口エリア（結願）', access: '蓮根駅→三崎口駅起点', rows: [
    {type:'temple', num:'14番', name:'妙音寺', addr:'三浦市初声町', stop:'三崎口駅徒歩', fare:0},
    {type:'seg', mode:'地下鉄', from:'蓮根駅', dep:0.2715, to:'三崎口駅', arr:0.3548}
  ]}
];

function formatTime(v) {
  const m = Math.round(v * 1440);
  return String(Math.floor(m/60)).padStart(2,'0') + ':' + String(m%60).padStart(2,'0');
}

const menu = document.getElementById('tabMenu');
const content = document.getElementById('panelContent');

DAYS.forEach((day, idx) => {
  const btn = document.createElement('div');
  btn.className = 'tab' + (idx === 0 ? ' active' : '');
  btn.textContent = day.label;
  btn.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('day-' + idx).classList.add('active');
  };
  menu.appendChild(btn);

  const panel = document.createElement('div');
  panel.id = 'day-' + idx;
  panel.className = 'panel' + (idx === 0 ? ' active' : '');
  
  let rows = '';
  let dayFare = 0;
  day.rows.forEach(r => {
    if (r.type === 'temple') {
      dayFare += r.fare;
      rows += `<tr class="temple-row"><td colspan="4"><span class="num-cell">${r.num}</span>${r.name}</td><td>${r.stop}</td><td>¥${r.fare}</td></tr>`;
    } else {
      rows += `<tr class="seg-row"><td><span class="mode-badge m-bus">${r.mode}</span></td><td>${r.from}</td><td>${formatTime(r.dep)}</td><td>${r.to}</td><td>${formatTime(r.arr)}</td><td><a class="map-btn" href="#">地図</a></td></tr>`;
    }
  });

  panel.innerHTML = `
    <div class="access-bar"><strong>${day.title}</strong><br>${day.access}</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>手段</th><th>発</th><th>時刻</th><th>着</th><th>時刻</th><th>地図</th></tr></thead>
        <tbody>${rows}<tr class="total-row"><td colspan="6">合計 ¥${dayFare.toLocaleString()}</td></tr></tbody>
      </table>
    </div>`;
  content.appendChild(panel);
});
</script>
</body>
</html>
