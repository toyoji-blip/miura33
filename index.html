<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>三浦三十三観音</title>

<style>

:root {

  --rust:   #8B3A2A;

  --gold:   #C4933F;

  --sage:   #3A6B3A;

  --warn:   #B85C00;

  --ink:    #1a1a1a;

  --muted:  #666;

  --border: #ccc;

  --row-odd:  #fff;

  --row-even: #f7f3ec;

  --hdr-bg:   #3d3228;

  --sub-bg:   #5c4a3a;

  --seg-bg:   #f0ede8;

}



* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }



body {

  font-family: -apple-system, "Hiragino Sans", sans-serif;

  font-size: 13px;

  background: #e8e2d8;

  color: var(--ink);

  padding-bottom: 32px;

}



/* ===== TOP HEADER ===== */

.app-bar {

  position: sticky;

  top: 0;

  z-index: 200;

  background: var(--rust);

  color: white;

  padding: 48px 16px 10px;

  text-align: center;

  box-shadow: 0 2px 6px rgba(0,0,0,.3);

}

.app-bar h1 { font-size: 1rem; font-weight: 700; letter-spacing: .1em; }

.app-bar p  { font-size: .72rem; opacity: .85; margin-top: 2px; }



/* ===== DAY TABS ===== */

.tabs {

  position: sticky;

  top: 82px;

  z-index: 190;

  display: flex;

  overflow-x: auto;

  scrollbar-width: none;

  background: #5c2318;

}

.tabs::-webkit-scrollbar { display: none; }

.tab {

  flex: none;

  padding: 9px 14px;

  font-size: .75rem;

  font-weight: 700;

  color: rgba(255,255,255,.55);

  white-space: nowrap;

  border-bottom: 3px solid transparent;

  cursor: pointer;

  transition: all .15s;

}

.tab.active { color: #fff; border-bottom-color: var(--gold); }



/* ===== SHEET PANEL ===== */

.panel { display: none; }

.panel.active { display: block; }



/* ===== ACCESS INFO ===== */

.access-bar {

  background: #fff8ee;

  border-left: 4px solid var(--gold);

  padding: 8px 12px;

  font-size: .75rem;

  color: #5a4020;

  margin: 10px 10px 6px;

  border-radius: 0 6px 6px 0;

  line-height: 1.6;

}

.access-bar .warn { color: var(--warn); font-weight: 700; }



/* ===== TABLE WRAPPER ===== */

.tbl-wrap {

  overflow-x: auto;

  margin: 0 10px 16px;

  border-radius: 8px;

  border: 1px solid var(--border);

  box-shadow: 0 1px 6px rgba(0,0,0,.1);

  -webkit-overflow-scrolling: touch;

}



table {

  border-collapse: collapse;

  width: 100%;

  min-width: 620px;

  background: white;

}



/* ===== HEADER ROWS ===== */

thead tr.hdr-main th {

  background: var(--hdr-bg);

  color: white;

  font-size: .72rem;

  font-weight: 700;

  padding: 7px 8px;

  white-space: nowrap;

  border-right: 1px solid rgba(255,255,255,.15);

  text-align: center;

}

thead tr.hdr-main th:last-child { border-right: none; }



/* ===== TEMPLE ROW ===== */

tr.temple-row {

  background: #e8f0e8;

  border-top: 2px solid #4a8a4a;

}

tr.temple-row td {

  padding: 7px 8px;

  font-weight: 700;

  font-size: .82rem;

  vertical-align: middle;

  border-right: 1px solid #c8d8c8;

}

tr.temple-row .num-cell {

  background: var(--sage);

  color: white;

  text-align: center;

  white-space: nowrap;

  min-width: 44px;

  border-radius: 4px;

  padding: 4px 6px;

  font-size: .75rem;

  display: inline-block;

}

tr.temple-row .num-cell.bangai { background: #8B6914; }

tr.temple-row .num-cell.warn   { background: var(--warn); }

tr.temple-row .note-cell { font-size: .72rem; font-weight: 400; color: #444; }

tr.temple-row .warn-txt { color: var(--warn); font-weight: 700; }

tr.temple-row .fare-cell {

  text-align: right;

  color: var(--rust);

  font-size: .8rem;

  white-space: nowrap;

}



/* ===== SEGMENT ROW ===== */

tr.seg-row {

  background: var(--row-odd);

  border-top: 1px solid #e0d8cc;

}

tr.seg-row:nth-child(even) { background: var(--row-even); }

tr.seg-row td {

  padding: 5px 8px;

  font-size: .75rem;

  vertical-align: middle;

  border-right: 1px solid #e0d8cc;

  white-space: nowrap;

}

tr.seg-row td:last-child { border-right: none; }



/* 手段バッジ */

.mode-badge {

  display: inline-flex;

  align-items: center;

  gap: 3px;

  padding: 2px 8px;

  border-radius: 4px;

  font-size: .7rem;

  font-weight: 700;

  white-space: nowrap;

}

.m-chikatetsu { background: #DBEAFE; color: #1E40AF; }

.m-keikyu     { background: #FEE2E2; color: #991B1B; }

.m-jr         { background: #DCFCE7; color: #166534; }

.m-bus        { background: #FEF3C7; color: #92400E; }

.m-walk       { background: #F3E8FF; color: #6B21A8; }



/* 時刻 */

.time-cell { color: #444; font-size: .72rem; text-align: center; }



/* 地名 */

.place-cell { color: var(--ink); font-size: .78rem; }



/* マップボタン */

.map-btn {

  display: inline-flex;

  align-items: center;

  justify-content: center;

  background: var(--rust);

  color: white;

  text-decoration: none;

  border-radius: 6px;

  padding: 5px 10px;

  font-size: .72rem;

  font-weight: 700;

  white-space: nowrap;

  touch-action: manipulation;

  min-height: 32px;

  gap: 3px;

}

.map-btn:active { opacity: .7; }

.map-btn.walk { background: #7B1FA2; }



/* ===== NOTE ROW ===== */

tr.note-row td {

  background: #fffbf0;

  color: #7a5c20;

  font-size: .7rem;

  padding: 6px 10px;

  font-style: italic;

  border-top: 1px solid #e8dcc8;

}



/* ===== TOTAL ROW ===== */

tr.total-row td {

  background: #f0e8d8;

  font-weight: 700;

  font-size: .8rem;

  padding: 7px 10px;

  border-top: 2px solid #c8b090;

  text-align: right;

  color: var(--rust);

}



/* col widths */

.col-mode  { width: 72px; }

.col-from  { min-width: 80px; }

.col-dep   { width: 52px; }

.col-to    { min-width: 80px; }

.col-arr   { width: 52px; }

.col-map   { width: 72px; }

</style>

</head>

// ===== 時刻変換 =====

function t(v) {

  if (!v && v !== 0) return '';

  if (typeof v === 'string') return v.replace(';',':');

  const m = Math.round(v * 1440);

  return String(Math.floor(m/60)).padStart(2,'0') + ':' + String(m%60).padStart(2,'0');

}



// ===== Google Maps URL =====

  const tm = (mode === '徒歩') ? 'walking' : 'transit';

  return 'https://www.google.com/maps/dir/?api=1'

    + '&origin='      + encodeURIComponent(from)

// ===== BUILD（表示順: 浦賀・久里浜, 葉山・秋谷, 三浦海岸東南, 三崎口・結願）=====

const tabsEl   = document.getElementById('tabs');

const panelsEl = document.getElementById('panels');



[DAYS[0], DAYS[1], DAYS[2]].forEach((day, di) => {

  // tab

  const tab = document.createElement('div');

  tab.className = 'tab' + (di===0?' active':'');

  tab.textContent = day.label;

  tab.onclick = () => {

    document.querySelectorAll('.tab').forEach((x,i)=>x.classList.toggle('active',i===di));

    document.querySelectorAll('.panel').forEach((x,i)=>x.classList.toggle('active',i===di));

    window.scrollTo({top:0,behavior:'smooth'});

  };

  tabsEl.appendChild(tab);



  // panel

  const panel = document.createElement('div');

  panel.className = 'panel' + (di===0?' active':'');



  // access

  const isWarnDay = day.note.startsWith('⚠');

  panel.innerHTML = `<div class="access-bar">

    <strong>${day.title}</strong><br>

    📍 ${day.access}<br>

    <span class="${isWarnDay?'warn':''}">${day.note}</span>

  </div>`;



  // table

  const wrap = document.createElement('div');

  wrap.className = 'tbl-wrap';



  const tbl = document.createElement('table');

  tbl.innerHTML = `<colgroup>

    <col class="col-mode"><col class="col-from"><col class="col-dep">

    <col class="col-to"><col class="col-arr"><col class="col-map">

  </colgroup>

  <thead>

    <tr class="hdr-main">

      <th>手段</th><th>出発地点</th><th>出発時刻</th>

      <th>到着地点</th><th>到着時刻</th><th>地図</th>

    </tr>

  </thead>`;



  const tbody = document.createElement('tbody');

  let totalFare = 0;



  day.rows.forEach(row => {

    const tr = document.createElement('tr');



    if (row.type === 'temple') {

      totalFare += (row.fare || 0);

      const isWarn = (row.note || '').includes('⚠');

      const isBangai = row.num === '番外';

      const numCls = isBangai ? 'bangai' : isWarn ? 'warn' : '';

      tr.className = 'temple-row';

      tr.innerHTML = `

        <td colspan="4">

          <span class="num-cell ${numCls}">${row.num}</span>

          　<strong>${row.name}</strong>

          　<span style="font-size:.72rem;color:#666">${row.addr}</span>

           <span class="note-cell ${isWarn?'warn-txt':''}">${row.note}</span>
           

        </td>

        <td class="note-cell" style="white-space:nowrap">${row.stop}</td>

        <td class="fare-cell">${row.fare > 0 ? '¥'+row.fare.toLocaleString() : ''}</td>`;

    } else {

      // seg row

      const ms = modeStyle[row.mode] || {cls:'m-bus',icon:'🚌'};

      const isWalk = row.mode === '徒歩';

      const url = gm(row.from, row.to, row.mode);

      const depStr = t(row.dep);

      const arrStr = t(row.arr);

      tr.className = 'seg-row';

      tr.innerHTML = `

        <td><span class="mode-badge ${ms.cls}">${ms.icon} ${row.mode}</span></td>

        <td class="place-cell">${row.from}</td>

        <td class="time-cell">${depStr}</td>

        <td class="place-cell">${row.to}</td>

        <td class="time-cell">${arrStr}</td>

        <td><a class="map-btn ${isWalk?'walk':''}" href="${url}" target="_blank">📍 地図</a></td>`;

    }

    tbody.appendChild(tr);

  });



  // total fare row

  const trTotal = document.createElement('tr');

  trTotal.className = 'total-row';

  trTotal.innerHTML = `<td colspan="6">本日の交通費合計（概算）　¥${totalFare.toLocaleString()}</td>`;

  tbody.appendChild(trTotal);



  tbl.appendChild(tbody);

  wrap.appendChild(tbl);

  panel.appendChild(wrap);

  panelsEl.appendChild(panel);

});
